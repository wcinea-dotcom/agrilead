# Netlify configuration for AGRILEAD Training & Consulting LLC
# The site is plain static HTML/CSS/JS. Only the public/ folder is published,
# so internal files (README, HANDOFF-CHECKLIST, _build_*.py) stay in the repo
# but are never served on the live site.

[build]
  publish = "public"
  # No build step is required — the pages are pre-built.

# Security & caching headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Friendly 404 -> home (optional; remove if you add a custom 404.html)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 404
