# Netlify configuration for AGRILEAD Training & Consulting LLC
# Plain static HTML/CSS/JS served from the repository root. No build step.

[build]
  publish = "."

# Security & long-cache headers for static assets
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
